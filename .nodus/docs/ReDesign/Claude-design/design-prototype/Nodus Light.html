<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<title>nodus — light</title>
<link rel="stylesheet" href="light/light.css" />
</head>
<body>
<div class="lapp" id="lapp">

  <!-- ============ top toolbar ============ -->
  <div class="topbar">
    <div class="tb-logo"><span></span></div>
    <div class="tb-menu">
      <button class="tb-mi solid" id="mWorkflow">Workflow</button>
      <button class="tb-mi" id="mEdit">Edit</button>
      <button class="tb-mi" id="mHelp">Help</button>
    </div>
    <div class="tb-spacer"></div>
    <div class="crumb">
      <button class="crumb-nav" id="crumbPrev">‹</button>
      <div class="crumb-tab">Streamer Setup <span class="cx" id="crumbX">×</span></div>
      <button class="crumb-nav" id="crumbNext">›</button>
    </div>
    <div class="tb-spacer"></div>
    <div class="tb-controls">
      <button class="icon-btn" id="moreBtn" title="node actions">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
      </button>
      <button class="queue-btn" id="queueBtn" title="run / process the graph">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Queue <span style="color:var(--mute);font-size:9px">▾</span>
      </button>
      <div class="stepper"><button id="stepUp" title="zoom in">▲</button><button id="stepDown" title="zoom out">▼</button></div>
      <button class="icon-btn" id="clearBtn" title="deselect"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      <button class="icon-btn" id="delBtn" title="delete selected node"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5h6v2M7 7l1 12h8l1-12"/></svg></button>
      <button class="icon-btn" id="menuBtn" title="view options"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
    </div>
  </div>

  <!-- ============ sub row ============ -->
  <div class="subrow">
    <div class="avatars">
      <div class="av busy" style="background:#E8C44B">P</div>
      <div class="av" style="background:#E86FB0">M</div>
      <div class="av" style="background:#5BA6D6">K</div>
      <div class="av more">+1</div>
    </div>
    <div class="sub-title">streamer setup · v3</div>
    <div class="sub-actions">
      <button class="btn-white" id="shareBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M8 8l4-4 4 4M5 20h14"/></svg>
        Share
      </button>
      <button class="btn-ghost" id="publicBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
        Make Public
      </button>
    </div>
  </div>

  <!-- ============ stage ============ -->
  <div class="stage" id="stage">
    <div class="aura"></div>
    <div class="world" id="world">
      <svg class="edges" id="edgesSvg" width="1" height="1"></svg>
      <!-- nodes + cursors injected by js -->
    </div>
    <div class="vignette"></div>

    <!-- floating generate (engine) -->
    <button class="gen-pill" id="genPill" title="start / pause the audio engine" style="left: 50%; top: 64px; transform: translateX(-50%);">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l1.6 5.4L19 10l-5.4 1.6L12 17l-1.6-5.4L5 10l5.4-1.6z"/></svg>
      <span class="gp-text">engine live</span>
    </button>

    <!-- status readout -->
    <div class="status">
      <div><b>T:</b> 0.00s</div>
      <div><b>sel:</b> <span id="selMeta">nothing selected</span></div>
      <div><b>N:</b> <span id="stN">7 (7)</span></div>
      <div><b>S:</b> 48.0k</div>
    </div>

    <!-- command bar -->
    <div class="cmdbar">
      <div class="cmd-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="cmdSearch" type="text" placeholder="search nodes · type a name to highlight…" autocomplete="off" />
      </div>
      <div class="cmd-tools">
        <button class="cmd-tool active" data-label="history" title="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M12 7v5l3 2"/><path d="M3.5 12a8.5 8.5 0 1 0 2.4-5.9M3.5 4v3h3"/></svg></button>
        <button class="cmd-tool" data-label="library" title="library"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg></button>
        <button class="cmd-tool" data-label="snapshot" title="snapshot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2.5"/><circle cx="12" cy="12.5" r="3.2"/><path d="M8 6l1.5-2h5L16 6"/></svg></button>
        <button class="cmd-tool" data-label="graph" title="graph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="6" cy="6" r="2.4"/><circle cx="18" cy="9" r="2.4"/><circle cx="9" cy="18" r="2.4"/><path d="M8 7l8 1.5M8 16l1-7"/></svg></button>
        <div class="cmd-grow"></div>
        <button class="cmd-tool" data-label="settings" title="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M12 2.5v3M12 18.5v3M21.5 12h-3M5.5 12h-3M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1M18.4 18.4l-2.1-2.1M7.7 7.7L5.6 5.6"/></svg></button>
      </div>
    </div>

    <!-- right rail -->
    <div class="rail">
      <div class="rail-grp">
        <button id="zin" title="zoom in">+</button>
        <button id="zout" title="zoom out">−</button>
        <button id="zfit" title="fit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/></svg></button>
      </div>
      <div class="rail-grp">
        <button id="eyeBtn" title="toggle activity"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="2.7"/></svg></button>
        <button id="linkBtn" title="connection mode"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M9 15l6-6M10.5 6.5l1-1a3.5 3.5 0 0 1 5 5l-1 1M13.5 17.5l-1 1a3.5 3.5 0 0 1-5-5l1-1"/></svg></button>
      </div>
    </div>
  </div>

</div>

<script src="light/light.js"></script>
<style id="__om-edit-overrides"></style>
</body>
</html>
