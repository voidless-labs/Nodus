name: Build Nodus Virtual Audio Driver

# Builds and test-signs src-tauri/driver/nodus_audio → nodus_audio.sys (+ .inf, .cat, .cer).
# Output is a test-signed driver package: install with Test Mode on (bcdedit /set testsigning on),
# or re-sign with an EV / attestation-signed certificate for release distribution.
#
# Build toolchain: the Enterprise WDK (EWDK) — a self-contained command-line build
# environment (MSBuild + compilers + SDK + WDK) that needs no Visual Studio VSIX.
# It is Microsoft's recommended way to build drivers in CI.
#
#   https://learn.microsoft.com/windows-hardware/drivers/develop/installing-the-enterprise-wdk
#
# REQUIRED ONE-TIME SETUP:
#   The EWDK ISO download is gated by Microsoft and its URL changes per release, so it
#   cannot be hard-coded. Set a repository variable EWDK_ISO_URL pointing to the EWDK ISO
#   (Settings → Secrets and variables → Actions → Variables → New variable), or pass it
#   via the workflow_dispatch input below. A Microsoft fwlink (go.microsoft.com/fwlink/...)
#   works directly — Invoke-WebRequest follows the 302 redirect.
#
#   NOTE: the EWDK ISO is large (~19 GB). It exceeds the 10 GB Actions cache limit, so it
#   is downloaded fresh each run (no caching). It fits on the runner's D: workspace drive.

on:
  workflow_dispatch:
    inputs:
      ewdk_iso_url:
        description: "EWDK ISO direct download URL (overrides the EWDK_ISO_URL repo variable)"
        required: false
        type: string
  push:
    # NOTE: a tags-only filter (no branches) disables branch-push triggers entirely,
    # so branches must be listed explicitly alongside tags.
    branches:
      - "**"
    tags:
      - "driver-v*"
    paths:
      - "src-tauri/driver/**"
      - ".github/workflows/driver.yml"

env:
  DRIVER_DIR: src-tauri/driver/nodus_audio
  PROJECT: nodus_audio.vcxproj
  CONFIG: Release
  PLATFORM: x64

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve EWDK ISO URL
        id: ewdk
        shell: pwsh
        run: |
          $url = "${{ inputs.ewdk_iso_url }}"
          if ([string]::IsNullOrWhiteSpace($url)) { $url = "${{ vars.EWDK_ISO_URL }}" }
          if ([string]::IsNullOrWhiteSpace($url)) {
            Write-Error "No EWDK ISO URL. Set the EWDK_ISO_URL repo variable or pass the workflow_dispatch input. See the comment at the top of driver.yml."
            exit 1
          }
          "url=$url" >> $env:GITHUB_OUTPUT

      - name: Download EWDK ISO
        shell: pwsh
        run: |
          # ~19 GB — too large for the Actions cache (10 GB limit), so fetch fresh each run.
          # Download to the D: workspace drive, which has room; C: may be too small.
          Write-Host "Free space before download:"
          Get-PSDrive -PSProvider FileSystem | Where-Object { $_.Name -in 'C','D' } |
            Format-Table Name,@{n='FreeGB';e={[math]::Round($_.Free/1GB,1)}}
          Write-Host "Downloading EWDK ISO (~19 GB, follows redirects)..."
          $ProgressPreference = 'SilentlyContinue'  # huge speedup for large IWR downloads
          Invoke-WebRequest -Uri "${{ steps.ewdk.outputs.url }}" -OutFile ewdk.iso -UseBasicParsing -MaximumRedirection 5
          $size = (Get-Item ewdk.iso).Length
          Write-Host "Downloaded $([math]::Round($size/1GB,2)) GB"
          if ($size -lt 1GB) { Write-Error "ISO looks too small — check the URL."; exit 1 }

      - name: Mount EWDK and build driver
        id: build
        shell: pwsh
        run: |
          $iso = (Resolve-Path ewdk.iso).Path
          Mount-DiskImage -ImagePath $iso | Out-Null
          # Get-Volume can race the mount and return an empty DriveLetter; retry briefly.
          $drive = $null
          for ($i = 0; $i -lt 30; $i++) {
            $vol = Get-DiskImage -ImagePath $iso | Get-Volume -ErrorAction SilentlyContinue
            if ($vol -and $vol.DriveLetter) { $drive = "$($vol.DriveLetter):"; break }
            Start-Sleep -Milliseconds 500
          }
          if (-not $drive) { Write-Error "Could not resolve EWDK drive letter after mount"; exit 1 }
          Write-Host "EWDK mounted at $drive"
          "drive=$drive" >> $env:GITHUB_OUTPUT

          # Detect the WDK kit version bundled in the EWDK (build\<ver>\) so we can pin
          # WindowsTargetPlatformVersion. The project uses the standard C++ driver toolset
          # (PlatformToolset=WindowsKernelModeDriver10.0), which pulls in the WDK props/targets
          # automatically — no manual import patching needed.
          $buildDir = Join-Path $drive "Program Files\Windows Kits\10\build"
          $kitVer = (Get-ChildItem $buildDir -Directory -ErrorAction SilentlyContinue |
                     Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
                     Sort-Object Name -Descending | Select-Object -First 1).Name
          if (-not $kitVer) { Write-Error "Could not detect WDK kit version under $buildDir"; exit 1 }
          Write-Host "WDK kit version: $kitVer"

          # SetupBuildEnv.cmd configures WDKContentRoot/PATH in the *current* cmd,
          # so msbuild (and signtool/inf2cat) resolve from the EWDK afterwards.
          $proj = Join-Path $env:DRIVER_DIR $env:PROJECT
          $cmd = "`"$drive\BuildEnv\SetupBuildEnv.cmd`" && msbuild `"$proj`" /p:Configuration=$env:CONFIG /p:Platform=$env:PLATFORM /p:WindowsTargetPlatformVersion=$kitVer /p:EnableInf2Cat=false /m"
          cmd.exe /c $cmd
          if ($LASTEXITCODE -ne 0) { Write-Error "Driver build failed ($LASTEXITCODE)"; exit 1 }

      - name: Locate build output
        id: out
        shell: pwsh
        run: |
          $sys = Get-ChildItem -Path $env:DRIVER_DIR -Recurse -Filter nodus_audio.sys |
                 Where-Object { $_.FullName -match "\\$($env:PLATFORM)\\$($env:CONFIG)" } |
                 Select-Object -First 1
          if (-not $sys) { $sys = Get-ChildItem -Path $env:DRIVER_DIR -Recurse -Filter nodus_audio.sys | Select-Object -First 1 }
          if (-not $sys) { Write-Error "nodus_audio.sys not found after build"; exit 1 }
          $pkg = $sys.Directory.FullName
          Write-Host "Package dir: $pkg"
          "pkgdir=$pkg" >> $env:GITHUB_OUTPUT
          # Ensure the .inf sits next to the .sys for inf2cat / install.
          Copy-Item (Join-Path $env:DRIVER_DIR "nodus_audio.inf") $pkg -Force

      - name: Test-sign driver (.sys + .cat)
        id: sign
        shell: pwsh
        run: |
          $drive  = "${{ steps.build.outputs.drive }}"
          $pkgsrc = "${{ steps.out.outputs.pkgdir }}"

          # Stage a clean, flat package dir with EXACTLY the inf + sys. inf2cat is very
          # sensitive to stray files / layout in the package dir; a minimal dir with the
          # files next to the inf is the canonical input.
          $stage = Join-Path $env:GITHUB_WORKSPACE "pkgstage"
          Remove-Item $stage -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item (Join-Path $pkgsrc      "nodus_audio.sys") $stage -Force
          Copy-Item (Join-Path $env:DRIVER_DIR "nodus_audio.inf") $stage -Force
          "pkg=$stage" >> $env:GITHUB_OUTPUT

          # Stamp a monotonically increasing DriverVer (build date + run number) so
          # install.ps1 can compare package vs installed version and skip/update.
          # Must happen BEFORE inf2cat: the catalog hashes the final .inf.
          $ver  = "1.0.${{ github.run_number }}.0"
          $date = (Get-Date).ToString("MM/dd/yyyy", [Globalization.CultureInfo]::InvariantCulture)
          $infPath = Join-Path $stage "nodus_audio.inf"
          (Get-Content $infPath) -replace '^(\s*DriverVer\s*=).*$', "`$1 $date,$ver" |
            Set-Content $infPath -Encoding ASCII
          Write-Host "Stamped DriverVer = $date,$ver"

          Write-Host "=== staging dir ==="
          Get-ChildItem $stage | Format-Table Name,Length
          Write-Host "=== nodus_audio.inf ==="
          Get-Content (Join-Path $stage "nodus_audio.inf")
          Write-Host "==================="

          # Generate an ephemeral self-signed code-signing cert for test signing.
          $cert = New-SelfSignedCertificate -Type CodeSigningCert `
            -Subject "CN=Nodus Test Certificate" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -KeyUsage DigitalSignature -KeyExportPolicy Exportable `
            -FriendlyName "Nodus Test Certificate" `
            -NotAfter (Get-Date).AddYears(3)
          $thumb = $cert.Thumbprint
          # Export the public cert so users can trust it (Trusted Root + Trusted Publishers).
          Export-Certificate -Cert $cert -FilePath (Join-Path $stage "nodus_test.cer") | Out-Null

          # Make EWDK tools (signtool, inf2cat) available in this shell.
          cmd.exe /c "`"$drive\BuildEnv\SetupBuildEnv.cmd`" && set" | ForEach-Object {
            if ($_ -match "^(PATH)=(.*)$") { $env:PATH = $matches[2] }
          }

          Push-Location $stage
          signtool sign /v /fd SHA256 /sha1 $thumb nodus_audio.sys
          if ($LASTEXITCODE -ne 0) { Write-Error ".sys signing failed"; exit 1 }

          inf2cat /driver:. /os:10_X64
          if ($LASTEXITCODE -ne 0) { Write-Error "inf2cat failed"; exit 1 }

          signtool sign /v /fd SHA256 /sha1 $thumb nodus_audio.cat
          if ($LASTEXITCODE -ne 0) { Write-Error ".cat signing failed"; exit 1 }
          Pop-Location

      - name: Unmount EWDK
        if: always()
        shell: pwsh
        run: if (Test-Path ewdk.iso) { Dismount-DiskImage -ImagePath (Resolve-Path ewdk.iso).Path | Out-Null }

      - name: Collect driver package
        shell: pwsh
        run: |
          $pkg = "${{ steps.sign.outputs.pkg }}"
          New-Item -ItemType Directory -Force out | Out-Null
          Copy-Item "$pkg\nodus_audio.sys" out\ -Force
          Copy-Item "$pkg\nodus_audio.inf" out\ -Force
          Copy-Item "$pkg\nodus_audio.cat" out\ -Force
          Copy-Item "$pkg\nodus_test.cer" out\ -Force
          # Include the PDB so a BSOD stack can be symbolized (nodus_audio.sys+offset).
          $pdb = Get-ChildItem -Path $env:DRIVER_DIR -Recurse -Filter nodus_audio.pdb -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($pdb) { Copy-Item $pdb.FullName out\ -Force }
          Copy-Item "$env:DRIVER_DIR\install.ps1"   out\ -Force
          Copy-Item "$env:DRIVER_DIR\uninstall.ps1" out\ -Force
          Get-ChildItem out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodus_audio-driver-${{ env.PLATFORM }}-${{ env.CONFIG }}
          path: out/**
          if-no-files-found: error
